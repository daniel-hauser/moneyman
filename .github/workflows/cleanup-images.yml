name: Clean up untagged service images

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - config-init
          - egress
          - notifier
          - exporter
          - scraper
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}-${{ matrix.target }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: "true"
