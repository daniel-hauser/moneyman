name: Test scraper connections

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/scraper/**"
      - "packages/**"
      - "patches/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Dockerfile"
      - ".github/workflows/test-connections.yml"

jobs:
  test-connections:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: scraper
          push: false
          load: true
          tags: moneyman-scraper:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run scraper access tests
        env:
          MONEYMAN_SCRAPER_CONFIG: >-
            {"accounts":[{"companyId":"max","password":"synthetic"}],"options":{"scraping":{},"security":{},"logging":{"getIpInfoUrl":false},"otp":{}}}
        run: |
          docker run --rm \
            --shm-size=2g \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            -e MONEYMAN_SCRAPER_CONFIG \
            moneyman-scraper:test \
            node --import tsx src/test-scraper-access.ts
