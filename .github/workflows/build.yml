name: Create and publish Docker images

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needed: ${{ steps.check.outputs.needed }}
      repository: ${{ steps.repository.outputs.name }}
      version: ${{ steps.version.outputs.version }}
      short-sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: check
        name: Check if release is needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || true)
          release_sha=$(git rev-list -n 1 "$latest_tag" 2>/dev/null || true)
          if [ -n "$latest_tag" ] && [ "$release_sha" = "$GITHUB_SHA" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - id: repository
        if: steps.check.outputs.needed == 'true'
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - id: version
        if: steps.check.outputs.needed == 'true'
        name: Generate CalVer version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          today=$(date -u +%Y.%m.%d)
          count=$(gh release list --json tagName --jq "[.[] | select(.tagName | startswith(\"v${today}.\"))] | length")
          version="v${today}.$((count + 1))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  build:
    if: needs.prepare.outputs.needed == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - config-init
          - egress
          - notifier
          - exporter
          - scraper
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.repository }}-${{ matrix.target }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=sha,format=short

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

  release:
    if: needs.prepare.outputs.needed == 'true'
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ needs.prepare.outputs.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short-sha }}
        run: |
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Release $VERSION" \
            --generate-notes \
            --notes "Docker service images published for commit $SHORT_SHA:

          - ghcr.io/$REPOSITORY-config-init:$VERSION
          - ghcr.io/$REPOSITORY-egress:$VERSION
          - ghcr.io/$REPOSITORY-notifier:$VERSION
          - ghcr.io/$REPOSITORY-exporter:$VERSION
          - ghcr.io/$REPOSITORY-scraper:$VERSION"
