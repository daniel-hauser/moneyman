name: Scrape

on:
  workflow_dispatch:
    inputs:
      containerTag:
        default: "latest"
        required: false
        description: "Service image tag to use"
  schedule:
    - cron: "5 10,22 * * *"

env:
  REGISTRY: ghcr.io
  TZ: Asia/Jerusalem
  MONEYMAN_LOG_DRIVER: none
  MONEYMAN_UNSAFE_STDOUT: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and pin service images
        env:
          TAG: ${{ inputs.containerTag || 'latest' }}
        run: |
          set -euo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          pin_image() {
            local service="$1"
            local variable="$2"
            local image="$REGISTRY/$repository-$service:$TAG"
            docker pull --quiet "$image" >/dev/null
            local digest
            digest=$(docker image inspect --format '{{index .RepoDigests 0}}' "$image")
            printf '%s=%s\n' "$variable" "$digest" >> "$GITHUB_ENV"
          }
          pin_image config-init MONEYMAN_CONFIG_INIT_IMAGE
          pin_image egress MONEYMAN_EGRESS_IMAGE
          pin_image notifier MONEYMAN_NOTIFIER_IMAGE
          pin_image exporter MONEYMAN_EXPORTER_IMAGE
          pin_image scraper MONEYMAN_SCRAPER_IMAGE

      - name: Run isolated services
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          COMPOSE_DISABLE_ENV_FILE: "1"
        run: |
          set -euo pipefail
          compose=(docker compose -f docker-compose.yml -f docker-compose.prod.yml)
          "${compose[@]}" up --detach >/dev/null
          scraper_id=$("${compose[@]}" ps --all --quiet scraper)
          scraper_exit=$(docker wait "$scraper_id")
          if [ "$scraper_exit" -ne 0 ]; then
            notifier_id=$("${compose[@]}" ps --all --quiet notifier)
            if ! timeout 120 docker wait "$notifier_id" >/dev/null; then
              echo "::error::Notifier did not finish private failure-log delivery."
            fi
            echo "::error::Moneyman failed. Review the private Telegram notification and log file."
            exit "$scraper_exit"
          fi

          exporter_id=$("${compose[@]}" ps --all --quiet exporter)
          notifier_id=$("${compose[@]}" ps --all --quiet notifier)
          if ! exporter_exit=$(timeout 120 docker wait "$exporter_id"); then
            echo "::error::Exporter did not shut down cleanly."
            exit 1
          fi
          if ! notifier_exit=$(timeout 120 docker wait "$notifier_id"); then
            echo "::error::Notifier did not finish private output delivery."
            exit 1
          fi
          if [ "$exporter_exit" -ne 0 ] || [ "$notifier_exit" -ne 0 ]; then
            echo "::error::Moneyman output delivery failed. Review the private Telegram notification."
            exit 1
          fi

      - name: Remove containers and secret volumes
        if: always()
        env:
          MONEYMAN_CONFIG: ${{ secrets.MONEYMAN_CONFIG }}
          COMPOSE_DISABLE_ENV_FILE: "1"
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml \
            down --volumes --remove-orphans >/dev/null 2>&1 || true
